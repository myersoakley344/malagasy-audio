<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enregistrement Audio Malgache</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; max-width: 500px; margin: 0 auto; line-height: 1.4; color: #333;}
        .hidden { display: none !important; }
        input, button { padding: 12px; font-size: 16px; width: 100%; margin-top: 8px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-blue { background-color: #007bff; color: white; }
        .btn-red { background-color: #dc3545; color: white; }
        .btn-green { background-color: #28a745; color: white; }
        .btn-gray { background-color: #6c757d; color: white; }
        .btn-light { background-color: #e2e6ea; color: #333; border: 1px solid #ccc; }
        .recording-section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        .word-display { font-size: 2.2em; background: #eee; padding: 25px 15px; text-align: center; border-radius: 8px; margin: 10px 0; border: 2px solid #ddd; }
        audio { width: 100%; margin-top: 10px; }
        .nav-bar { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 10px; }
        .nav-bar button { padding: 10px; font-size: 14px; margin-top: 0; }
        .status-badge { text-align: center; color: #28a745; font-weight: bold; font-size: 0.9em; height: 20px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>Entrez votre code d'accès</h2>
    <input type="text" id="access-code" placeholder="Code" autocapitalize="none">
    <button class="btn-blue" onclick="login()">Valider</button>
    <div id="error-msg" class="hidden" style="color:red; font-weight:bold; margin-top:10px;"></div>
</div>

<div id="app-screen" class="hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <div style="font-size: 14px; font-weight: bold;">Mot <span id="lbl-current">0</span> / <span id="lbl-total">0</span></div>
        <button onclick="logout()" style="width: auto; padding: 6px 12px; margin:0;" class="btn-gray">Déconnexion</button>
    </div>

    <!-- Navigation -->
    <div class="nav-bar">
        <button id="btn-prev" class="btn-light" onclick="navPrev()">⬅ Précédent</button>
        <button class="btn-blue" onclick="jumpNextUnrecorded()">⏭ Non Fait</button>
        <button id="btn-next" class="btn-light" onclick="navNext()">Suivant ➡</button>
    </div>

    <div id="lbl-status" class="status-badge"></div>
    <div id="word-display" class="word-display">...</div>

    <div class="recording-section">
        <h3 style="margin-top: 0;">Lent (Slow)</h3>
        <button id="btn-record-slow" class="btn-red" onclick="startRecording('slow')">⏺ Enregistrer</button>
        <button id="btn-stop-slow" class="btn-gray hidden" onclick="stopRecording('slow')">⏹ Stop</button>
        <audio id="audio-slow" controls class="hidden"></audio>
    </div>

    <div class="recording-section">
        <h3 style="margin-top: 0;">Naturel (Normal)</h3>
        <button id="btn-record-natural" class="btn-red" onclick="startRecording('natural')">⏺ Enregistrer</button>
        <button id="btn-stop-natural" class="btn-gray hidden" onclick="stopRecording('natural')">⏹ Stop</button>
        <audio id="audio-natural" controls class="hidden"></audio>
    </div>

    <button id="btn-submit" class="btn-green hidden" onclick="submitRecordings()">✅ Envoyer (Submit)</button>
    <div id="upload-status" style="margin-top: 10px; font-weight: bold; text-align: center;"></div>
</div>

<script>
const SUPABASE_URL = 'https://coaiznrxtpdqatvfbsyi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvYWl6bnJ4dHBkcWF0dmZic3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDUwMzUsImV4cCI6MjA5NjU4MTAzNX0.Si9OSFc97KrG3x8obbWFfSPgE5C4rRYXwZ9J7sSdT-o';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let allWords = [];
let recordedWordIds = new Set(); // Tracks what this user has finished
let currentIndex = 0;

let mediaRecorder = null;
let audioChunks = [];
let recordings = { slow: null, natural: null };

async function login() {
    const code = document.getElementById('access-code').value.trim().toLowerCase();

    const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: code + "@malagasy.local",
        password: code
    });

    if (error) {
        document.getElementById('error-msg').innerText = "Code incorrect";
        document.getElementById('error-msg').classList.remove('hidden');
    } else {
        currentUser = data.user;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.remove('hidden');
        document.getElementById('word-display').innerText = "Chargement des mots...";
        await fetchAllData();
    }
}

async function fetchAllData() {
    // 1. Load entire dictionary
    const { data: dict } = await supabaseClient.from('words').select('id, word_text').order('id', { ascending: true });
    allWords = dict;

    // 2. Load progress for this user
    const { data: recs } = await supabaseClient.from('user_recordings').select('word_id').eq('speaker_id', currentUser.id);
    if (recs) {
        recs.forEach(r => recordedWordIds.add(r.word_id));
    }

    // 3. Jump to the best spot
    jumpNextUnrecorded();
}

function jumpNextUnrecorded() {
    // Find first word ID that is NOT in the recorded Set
    const nextIndex = allWords.findIndex(word => !recordedWordIds.has(word.id));

    if (nextIndex !== -1) {
        currentIndex = nextIndex;
        renderWord();
    } else {
        // If they did everything!
        alert("Félicitations ! Vous avez enregistré tous les mots disponibles. (You have finished all words!)");
        currentIndex = 0; // just show the first word
        renderWord();
    }
}

function navPrev() {
    if (currentIndex > 0) {
        currentIndex--;
        renderWord();
    }
}

function navNext() {
    if (currentIndex < allWords.length - 1) {
        currentIndex++;
        renderWord();
    }
}

function renderWord() {
    const word = allWords[currentIndex];

    // Header UI
    document.getElementById('lbl-current').innerText = currentIndex + 1;
    document.getElementById('lbl-total').innerText = allWords.length;
    document.getElementById('word-display').innerText = word.word_text;

    // Status Badge
    if (recordedWordIds.has(word.id)) {
        document.getElementById('lbl-status').innerText = "✅ Déjà enregistré";
    } else {
        document.getElementById('lbl-status').innerText = "";
    }

    // Enable/Disable Nav Buttons
    document.getElementById('btn-prev').disabled = (currentIndex === 0);
    document.getElementById('btn-next').disabled = (currentIndex === allWords.length - 1);

    // Reset Audio UI
    recordings = { slow: null, natural: null };
    document.getElementById('btn-submit').classList.add('hidden');
    document.getElementById('upload-status').innerText = "";

    ['slow', 'natural'].forEach(type => {
        document.getElementById(`audio-${type}`).classList.add('hidden');
        document.getElementById(`audio-${type}`).src = "";
        document.getElementById(`btn-record-${type}`).classList.remove('hidden');
        document.getElementById(`btn-stop-${type}`).classList.add('hidden');
        document.getElementById(`btn-record-${type}`).innerText = "⏺ Enregistrer"; 
    });
}

// --- MICROPHONE LOGIC ---
async function startRecording(type) {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

    mediaRecorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        recordings[type] = blob;

        const url = URL.createObjectURL(blob);
        const audioEl = document.getElementById(`audio-${type}`);
        audioEl.src = url;
        audioEl.classList.remove('hidden');

        if (recordings.slow && recordings.natural) {
            document.getElementById('btn-submit').classList.remove('hidden');
        }
    };

    mediaRecorder.start();

    document.getElementById(`btn-record-${type}`).classList.add('hidden');
    document.getElementById(`btn-stop-${type}`).classList.remove('hidden');
}

function stopRecording(type) {
    mediaRecorder.stop();
    document.getElementById(`btn-stop-${type}`).classList.add('hidden');
    document.getElementById(`btn-record-${type}`).classList.remove('hidden');
    document.getElementById(`btn-record-${type}`).innerText = "🔄 Re-enregistrer";
}

// --- UPLOAD LOGIC ---
async function submitRecordings() {
    const currentWordRow = allWords[currentIndex];
    const status = document.getElementById('upload-status');
    status.innerText = "Envoi...";
    document.getElementById('btn-submit').classList.add('hidden');

    try {
        const slowName = `${currentUser.id}_word_${currentWordRow.id}_slow.webm`;
        const natName = `${currentUser.id}_word_${currentWordRow.id}_natural.webm`;

        await supabaseClient.storage.from('recordings').upload(slowName, recordings.slow, { upsert: true });
        await supabaseClient.storage.from('recordings').upload(natName, recordings.natural, { upsert: true });

        const slowUrl = supabaseClient.storage.from('recordings').getPublicUrl(slowName).data.publicUrl;
        const natUrl = supabaseClient.storage.from('recordings').getPublicUrl(natName).data.publicUrl;

        // Upsert uses the unique constraint we added to prevent duplicate rows inside user_recordings
        await supabaseClient.from('user_recordings').upsert({
            word_id: currentWordRow.id,
            speaker_id: currentUser.id,
            audio_slow: slowUrl,
            audio_natural: natUrl
        }, { onConflict: 'speaker_id, word_id' });

        // Mark it as done internally and immediately jump to the next unrecorded word
        recordedWordIds.add(currentWordRow.id);
        jumpNextUnrecorded();
        status.innerText = "";

    } catch (e) {
        console.error(e);
        status.innerText = "Erreur upload";
        document.getElementById('btn-submit').classList.remove('hidden');
    }
}

function logout() {
    supabaseClient.auth.signOut();
    location.reload();
}
</script>

</body>
</html>
