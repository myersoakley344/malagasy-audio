<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enregistrement Audio Malgache</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; max-width: 500px; margin: 0 auto; }
        .hidden { display: none !important; }
        input, button { padding: 15px; font-size: 16px; width: 100%; margin-top: 10px; border-radius: 8px; }
        button { border: none; font-weight: bold; }
        .btn-blue { background-color: #007bff; color: white; }
        .btn-red { background-color: #dc3545; color: white; }
        .btn-green { background-color: #28a745; color: white; }
        .btn-gray { background-color: #6c757d; color: white; }
        .recording-section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .word-display { font-size: 2em; background: #eee; padding: 20px; text-align: center; }
        audio { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>Entrez votre code d'accès</h2>
    <!-- Added autocapitalize="none" to stop mobile keyboards from capitalizing -->
    <input type="text" id="access-code" placeholder="Code" autocapitalize="none">
    <button class="btn-blue" onclick="login()">Valider</button>
    <div id="error-msg" class="hidden" style="color:red;"></div>
</div>

<div id="app-screen" class="hidden">
    <button onclick="logout()" class="btn-gray">Se déconnecter (Logout)</button>
    <h3>Mot à enregistrer :</h3>
    <div id="word-display" class="word-display">...</div>

    <div class="recording-section">
        <h3>Lent</h3>
        <button id="btn-record-slow" class="btn-red" onclick="startRecording('slow')">⏺ Enregistrer</button>
        <button id="btn-stop-slow" class="btn-gray hidden" onclick="stopRecording('slow')">⏹ Stop</button>
        <audio id="audio-slow" controls class="hidden"></audio>
    </div>

    <div class="recording-section">
        <h3>Naturel</h3>
        <button id="btn-record-natural" class="btn-red" onclick="startRecording('natural')">⏺ Enregistrer</button>
        <button id="btn-stop-natural" class="btn-gray hidden" onclick="stopRecording('natural')">⏹ Stop</button>
        <audio id="audio-natural" controls class="hidden"></audio>
    </div>

    <button id="btn-submit" class="btn-green hidden" onclick="submitRecordings()">Envoyer</button>
    <div id="upload-status" style="margin-top: 10px; font-weight: bold; text-align: center;"></div>
</div>

<div id="done-screen" class="hidden">
    <h2>Félicitations ! 🎉</h2>
    <p>Vous avez terminé tous les mots.</p>
</div>

<script>
const SUPABASE_URL = 'https://coaiznrxtpdqatvfbsyi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvYWl6bnJ4dHBkcWF0dmZic3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDUwMzUsImV4cCI6MjA5NjU4MTAzNX0.Si9OSFc97KrG3x8obbWFfSPgE5C4rRYXwZ9J7sSdT-o';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentWordRow = null;
let mediaRecorder = null;
let audioChunks = [];
let recordings = { slow: null, natural: null };

async function login() {
    // FIX: Force to lowercase so Auto-Capitalize on phones doesn't break passwords
    const code = document.getElementById('access-code').value.trim().toLowerCase();

    const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: code + "@malagasy.local",
        password: code
    });

    if (error) {
        document.getElementById('error-msg').innerText = "Code incorrect";
        document.getElementById('error-msg').classList.remove('hidden');
    } else {
        currentUser = data.user;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.remove('hidden');
        fetchNextWord();
    }
}

async function fetchNextWord() {
    const { data: allWords } = await supabaseClient.from('words').select('id, word_text').order('id', { ascending: true });

    const { data: recordedData } = await supabaseClient.from('user_recordings').select('word_id').eq('speaker_id', currentUser.id);

    let recordedWordIds = [];
    if (recordedData) {
        recordedWordIds = recordedData.map(r => r.word_id);
    }

    currentWordRow = allWords.find(word => !recordedWordIds.includes(word.id));

    if (!currentWordRow) {
        document.getElementById('app-screen').classList.add('hidden');
        document.getElementById('done-screen').classList.remove('hidden');
        return;
    }

    document.getElementById('word-display').innerText = currentWordRow.word_text;

    recordings = { slow: null, natural: null };
    document.getElementById('btn-submit').classList.add('hidden');
    ['slow', 'natural'].forEach(type => {
        document.getElementById(`audio-${type}`).classList.add('hidden');
        document.getElementById(`btn-record-${type}`).classList.remove('hidden');
        document.getElementById(`btn-stop-${type}`).classList.add('hidden');
        document.getElementById(`btn-record-${type}`).innerText = "⏺ Enregistrer"; 
    });
}

async function startRecording(type) {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

    mediaRecorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        recordings[type] = blob;

        const url = URL.createObjectURL(blob);
        const audioEl = document.getElementById(`audio-${type}`);
        audioEl.src = url;
        audioEl.classList.remove('hidden');

        if (recordings.slow && recordings.natural) {
            document.getElementById('btn-submit').classList.remove('hidden');
        }
    };

    mediaRecorder.start();

    document.getElementById(`btn-record-${type}`).classList.add('hidden');
    document.getElementById(`btn-stop-${type}`).classList.remove('hidden');
}

function stopRecording(type) {
    mediaRecorder.stop();
    document.getElementById(`btn-stop-${type}`).classList.add('hidden');
    document.getElementById(`btn-record-${type}`).classList.remove('hidden');
    document.getElementById(`btn-record-${type}`).innerText = "🔄 Re-enregistrer";
}

async function submitRecordings() {
    const status = document.getElementById('upload-status');
    status.innerText = "Envoi...";
    document.getElementById('btn-submit').classList.add('hidden');

    try {
        const slowName = `${currentUser.id}_word_${currentWordRow.id}_slow.webm`;
        const natName = `${currentUser.id}_word_${currentWordRow.id}_natural.webm`;

        await supabaseClient.storage.from('recordings').upload(slowName, recordings.slow, { upsert: true });
        await supabaseClient.storage.from('recordings').upload(natName, recordings.natural, { upsert: true });

        const slowUrl = supabaseClient.storage.from('recordings').getPublicUrl(slowName).data.publicUrl;
        const natUrl = supabaseClient.storage.from('recordings').getPublicUrl(natName).data.publicUrl;

        await supabaseClient.from('user_recordings').insert({
            word_id: currentWordRow.id,
            speaker_id: currentUser.id,
            audio_slow: slowUrl,
            audio_natural: natUrl
        });

        fetchNextWord();
        status.innerText = "";

    } catch (e) {
        console.error(e);
        status.innerText = "Erreur upload";
        document.getElementById('btn-submit').classList.remove('hidden');
    }
}

function logout() {
    supabaseClient.auth.signOut();
    location.reload();
}
</script>

</body>
</html>
