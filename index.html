<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enregistrement Audio Malgache</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; max-width: 500px; margin: 0 auto; line-height: 1.4; color: #333;}
        .hidden { display: none !important; }
        input, button { padding: 12px; font-size: 16px; width: 100%; margin-top: 8px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-blue { background-color: #007bff; color: white; }
        .btn-red { background-color: #dc3545; color: white; }
        .btn-green { background-color: #28a745; color: white; }
        .btn-gray { background-color: #6c757d; color: white; }
        .btn-light { background-color: #e2e6ea; color: #333; border: 1px solid #ccc; }
        .recording-section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        .word-display { font-size: 2.2em; background: #eee; padding: 25px 15px; text-align: center; border-radius: 8px; margin: 10px 0; border: 2px solid #ddd; }
        audio { width: 100%; margin-top: 10px; }
        .nav-bar { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 10px; }
        .nav-bar button { padding: 10px; font-size: 14px; margin-top: 0; }
        .status-badge { color: #28a745; font-size: 0.8em; font-weight: normal; margin-left: 10px; }
        .header-row { display: flex; align-items: center; margin-bottom: 5px; }
        .header-row h3 { margin: 0; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>Entrez votre code d'accès</h2>
    <input type="text" id="access-code" placeholder="Code" autocapitalize="none">
    <button class="btn-blue" onclick="login()">Valider</button>
    <div id="error-msg" class="hidden" style="color:red; font-weight:bold; margin-top:10px;"></div>
</div>

<div id="app-screen" class="hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <div style="font-size: 14px; font-weight: bold;">Mot <span id="lbl-current">0</span> / <span id="lbl-total">0</span></div>
        <button onclick="logout()" style="width: auto; padding: 6px 12px; margin:0;" class="btn-gray">Déconnexion</button>
    </div>

    <!-- Navigation -->
    <div class="nav-bar">
        <button id="btn-prev" class="btn-light" onclick="navPrev()">⬅ Précédent</button>
        <button class="btn-blue" onclick="jumpNextUnrecorded()">⏭ Non Fait</button>
        <button id="btn-next" class="btn-light" onclick="navNext()">Suivant ➡</button>
    </div>

    <div id="word-display" class="word-display">...</div>

    <div class="recording-section">
        <div class="header-row">
            <h3>Lent (Slow)</h3>
            <span id="badge-slow" class="status-badge hidden">✅ Déjà enregistré</span>
        </div>
        <button id="btn-record-slow" class="btn-red" onclick="startRecording('slow')">⏺ Enregistrer</button>
        <button id="btn-stop-slow" class="btn-gray hidden" onclick="stopRecording('slow')">⏹ Stop</button>
        <audio id="audio-slow" controls class="hidden"></audio>
    </div>

    <div class="recording-section">
        <div class="header-row">
            <h3>Naturel (Normal)</h3>
            <span id="badge-natural" class="status-badge hidden">✅ Déjà enregistré</span>
        </div>
        <button id="btn-record-natural" class="btn-red" onclick="startRecording('natural')">⏺ Enregistrer</button>
        <button id="btn-stop-natural" class="btn-gray hidden" onclick="stopRecording('natural')">⏹ Stop</button>
        <audio id="audio-natural" controls class="hidden"></audio>
    </div>

    <button id="btn-submit" class="btn-green hidden" onclick="submitRecordings()">✅ Envoyer (Submit)</button>
    <div id="upload-status" style="margin-top: 10px; font-weight: bold; text-align: center;"></div>
</div>

<script>
const SUPABASE_URL = 'https://coaiznrxtpdqatvfbsyi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvYWl6bnJ4dHBkcWF0dmZic3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDUwMzUsImV4cCI6MjA5NjU4MTAzNX0.Si9OSFc97KrG3x8obbWFfSPgE5C4rRYXwZ9J7sSdT-o';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let allWords = [];
let savedDbRecordings = new Map(); // Stores what was downloaded from DB
let currentIndex = 0;

let mediaRecorder = null;
let audioChunks = [];
let newRecordings = { slow: null, natural: null }; // Stores ONLY newly recorded audio

async function login() {
    const code = document.getElementById('access-code').value.trim().toLowerCase();

    const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: code + "@malagasy.local",
        password: code
    });

    if (error) {
        document.getElementById('error-msg').innerText = "Code incorrect";
        document.getElementById('error-msg').classList.remove('hidden');
    } else {
        currentUser = data.user;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.remove('hidden');
        document.getElementById('word-display').innerText = "Chargement des mots...";
        await fetchAllData();
    }
}

async function fetchAllData() {
    // Load dictionary
    const { data: dict } = await supabaseClient.from('words').select('id, word_text').order('id', { ascending: true });
    allWords = dict;

    // Load progress and audio URLs for this user
    const { data: recs } = await supabaseClient.from('user_recordings').select('word_id, audio_slow, audio_natural').eq('speaker_id', currentUser.id);
    if (recs) {
        recs.forEach(r => savedDbRecordings.set(r.word_id, r));
    }

    jumpNextUnrecorded();
}

function jumpNextUnrecorded() {
    // Jump to the first word that doesn't have BOTH recordings in the DB
    const nextIndex = allWords.findIndex(word => {
        const saved = savedDbRecordings.get(word.id);
        return !(saved && saved.audio_slow && saved.audio_natural);
    });

    if (nextIndex !== -1) {
        currentIndex = nextIndex;
        renderWord();
    } else {
        alert("Félicitations ! Vous avez enregistré tous les mots complètement.");
        currentIndex = 0; 
        renderWord();
    }
}

function navPrev() {
    if (currentIndex > 0) { currentIndex--; renderWord(); }
}

function navNext() {
    if (currentIndex < allWords.length - 1) { currentIndex++; renderWord(); }
}

function renderWord() {
    const word = allWords[currentIndex];

    document.getElementById('lbl-current').innerText = currentIndex + 1;
    document.getElementById('lbl-total').innerText = allWords.length;
    document.getElementById('word-display').innerText = word.word_text;

    // Reset new recordings for this word
    newRecordings = { slow: null, natural: null };
    document.getElementById('btn-submit').classList.add('hidden');
    document.getElementById('upload-status').innerText = "";

    const saved = savedDbRecordings.get(word.id) || {};

    // Setup logic for both sections
    setupSection('slow', saved.audio_slow);
    setupSection('natural', saved.audio_natural);

    document.getElementById('btn-prev').disabled = (currentIndex === 0);
    document.getElementById('btn-next').disabled = (currentIndex === allWords.length - 1);
}

function setupSection(type, savedUrl) {
    const audioEl = document.getElementById(`audio-${type}`);
    const badgeEl = document.getElementById(`badge-${type}`);
    const btnRecord = document.getElementById(`btn-record-${type}`);
    const btnStop = document.getElementById(`btn-stop-${type}`);

    btnStop.classList.add('hidden');

    if (savedUrl) {
        badgeEl.classList.remove('hidden');
        // Add a timestamp to bypass browser audio caching
        audioEl.src = savedUrl + "?t=" + new Date().getTime();
        audioEl.classList.remove('hidden');
        btnRecord.innerText = "🔄 Re-enregistrer";
    } else {
        badgeEl.classList.add('hidden');
        audioEl.src = "";
        audioEl.classList.add('hidden');
        btnRecord.innerText = "⏺ Enregistrer";
    }
    btnRecord.classList.remove('hidden');
}

async function startRecording(type) {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

    mediaRecorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        newRecordings[type] = blob;

        const url = URL.createObjectURL(blob);
        const audioEl = document.getElementById(`audio-${type}`);
        audioEl.src = url;
        audioEl.classList.remove('hidden');

        // Hide the badge if we are overwriting it in memory
        document.getElementById(`badge-${type}`).classList.add('hidden');

        checkSubmitConditions();
    };

    mediaRecorder.start();

    document.getElementById(`btn-record-${type}`).classList.add('hidden');
    document.getElementById(`btn-stop-${type}`).classList.remove('hidden');
}

function stopRecording(type) {
    mediaRecorder.stop();
    document.getElementById(`btn-stop-${type}`).classList.add('hidden');
    document.getElementById(`btn-record-${type}`).classList.remove('hidden');
    document.getElementById(`btn-record-${type}`).innerText = "🔄 Re-enregistrer";
}

function checkSubmitConditions() {
    const word = allWords[currentIndex];
    const saved = savedDbRecordings.get(word.id) || {};

    const hasSlow = newRecordings.slow || saved.audio_slow;
    const hasNat = newRecordings.natural || saved.audio_natural;
    const somethingNew = newRecordings.slow || newRecordings.natural;

    // Show submit button ONLY if they have BOTH files (either saved or new) AND they actually recorded something new
    if (hasSlow && hasNat && somethingNew) {
        document.getElementById('btn-submit').classList.remove('hidden');
    } else {
        document.getElementById('btn-submit').classList.add('hidden');
    }
}

async function submitRecordings() {
    const currentWordRow = allWords[currentIndex];
    const status = document.getElementById('upload-status');
    status.innerText = "Envoi...";
    document.getElementById('btn-submit').classList.add('hidden');

    try {
        const saved = savedDbRecordings.get(currentWordRow.id) || {};
        let finalSlowUrl = saved.audio_slow;
        let finalNatUrl = saved.audio_natural;

        // 1. Only upload the ones they actually pressed "Record" on
        if (newRecordings.slow) {
            const slowName = `${currentUser.id}_word_${currentWordRow.id}_slow.webm`;
            await supabaseClient.storage.from('recordings').upload(slowName, newRecordings.slow, { upsert: true });
            finalSlowUrl = supabaseClient.storage.from('recordings').getPublicUrl(slowName).data.publicUrl;
        }

        if (newRecordings.natural) {
            const natName = `${currentUser.id}_word_${currentWordRow.id}_natural.webm`;
            await supabaseClient.storage.from('recordings').upload(natName, newRecordings.natural, { upsert: true });
            finalNatUrl = supabaseClient.storage.from('recordings').getPublicUrl(natName).data.publicUrl;
        }

        // 2. Update Database with the mixed results
        await supabaseClient.from('user_recordings').upsert({
            word_id: currentWordRow.id,
            speaker_id: currentUser.id,
            audio_slow: finalSlowUrl,
            audio_natural: finalNatUrl
        }, { onConflict: 'speaker_id, word_id' });

        // 3. Update memory so we don't have to reload the page
        savedDbRecordings.set(currentWordRow.id, {
            word_id: currentWordRow.id,
            audio_slow: finalSlowUrl,
            audio_natural: finalNatUrl
        });

        // Jump to next
        jumpNextUnrecorded();
        status.innerText = "";

    } catch (e) {
        console.error(e);
        status.innerText = "Erreur upload";
        document.getElementById('btn-submit').classList.remove('hidden');
    }
}

function logout() {
    supabaseClient.auth.signOut();
    location.reload();
}
</script>

</body>
</html>
