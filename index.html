<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enregistrement Audio</title>
    <!-- Use Supabase from a CDN for low-bandwidth, no-build setups -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
        .hidden { display: none; }
        input, button { padding: 10px; font-size: 16px; width: 100%; margin-top: 10px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; border-radius: 5px; }
        .error { color: red; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <h2>Entrez votre code d'accès</h2>
        <p><i>(Enter your access code)</i></p>
        <input type="text" id="access-code" placeholder="Code (ex: test)">
        <button onclick="login()">Valider (Submit)</button>
        <div id="error-msg" class="error hidden"></div>
    </div>

    <!-- App Screen -->
    <div id="app-screen" class="hidden">
        <h2 style="color: green;">Connexion réussie ! (Connected successfully!)</h2>
        <h3>Mot à enregistrer (Word to record):</h3>
        <h1 id="word-display" style="font-size: 2em; background: #eee; padding: 20px; text-align: center;">Chargement... (Loading...)</h1>

        <p><button onclick="logout()" style="background-color: #dc3545;">Se déconnecter (Logout)</button></p>
    </div>

    <script>
        // --- PUT YOUR SUPABASE KEYS HERE ---
        const SUPABASE_URL = 'https://coaiznrxtpdqatvfbsyi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvYWl6bnJ4dHBkcWF0dmZic3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDUwMzUsImV4cCI6MjA5NjU4MTAzNX0.Si9OSFc97KrG3x8obbWFfSPgE5C4rRYXwZ9J7sSdT-o';
        // -----------------------------------

        // FIX: Renamed variable to avoid conflict with the global "supabase" object
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function login() {
            const code = document.getElementById('access-code').value.trim();
            const errorMsg = document.getElementById('error-msg');

            // Reconstruct the fake email: "test" becomes "test@malagasy.local"
            const email = code + "@malagasy.local";
            const password = code;

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                errorMsg.innerText = "Code incorrect. / Incorrect code.";
                errorMsg.classList.remove('hidden');
                console.error(error);
            } else {
                // Success! Switch screens and fetch words.
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                fetchWord();
            }
        }

        async function fetchWord() {
            // Fetch one word from the database
            const { data, error } = await supabaseClient
                .from('words')
                .select('word_text')
                .limit(1);

            if (error) {
                document.getElementById('word-display').innerText = "Erreur de base de données (Database error)";
                console.error(error);
                return;
            }

            if (data && data.length > 0) {
                document.getElementById('word-display').innerText = data[0].word_text;
            } else {
                document.getElementById('word-display').innerText = "Aucun mot trouvé (No words found)";
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('access-code').value = '';
        }
    </script>
</body>
</html>
